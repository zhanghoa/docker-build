name: Build and Push Camoufox Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许你手动在GitHub网页上触发构建

env:
  REGISTRY: docker.io # 若使用 GitHub Container Registry 可改为 ghcr.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/camoufox # 请替换为你的镜像名

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ci # 使用我们准备好的Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
