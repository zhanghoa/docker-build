name: Build jo-inc Camofox API Server for ARM64

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 直接克隆 jo-inc 官方仓库代码
      - name: Checkout official repository
        uses: actions/checkout@v4
        with:
          repository: jo-inc/camofox-browser
          ref: master

      # 【核心步骤】：在宿主机（x86）上执行官方的下载脚本，获取 ARM64 的二进制内核包放到 dist/ 目录下
      - name: Fetch Camoufox binaries for ARM64
        run: make fetch ARCH=aarch64

      # 注册 QEMU 跨架构引擎
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 官方的 Dockerfile 里面写了 --mount=type=bind,source=dist，所以它会自动读取刚才下载的文件
      - name: Build and push ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
