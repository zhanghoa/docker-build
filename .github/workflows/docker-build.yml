name: Build Camofox for ARM64

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # 💡 换回普通服务器，3秒钟内绝对接单，不再排队！
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout custom repository
        uses: actions/checkout@v4

      - name: Fetch and Isolate Camoufox binaries
        run: |
          git clone https://github.com/jo-inc/camoufox-browser camofox-src
          cd camofox-src && make fetch ARCH=aarch64 && cd ..
          mkdir -p dist
          find . -name "*.zip" -exec cp {} dist/ \;
          echo "Verified assets in current build context:"
          ls -lh dist/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 💡 请回 QEMU，用于跨架构打包环境（但不负责硬编译，所以不会崩溃）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Execute Industrial Docker Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
